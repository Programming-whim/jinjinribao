{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>⚙️ 配置管理</h2>
</div>

<div class="config-layout">
    <div class="card">
        <div class="card-header"><h3>🔑 账号设置</h3></div>
        <div class="card-body">
            <div class="form-group">
                <label>手机号</label>
                <input type="text" id="cfgUsername" value="{{ username }}" placeholder="请输入手机号">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="cfgPassword" value="{{ password }}" placeholder="请输入密码">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><h3>🤖 AI 设置</h3></div>
        <div class="card-body">
            <div class="form-group">
                <label>API Key</label>
                <input type="text" id="cfgApiKey" value="{{ ai_settings.api_key }}" placeholder="sk-xxx">
            </div>
            <div class="form-group">
                <label>API 地址</label>
                <input type="text" id="cfgApiUrl" value="{{ ai_settings.api_url }}" placeholder="https://api.deepseek.com/v1">
            </div>
            <div class="form-group">
                <label>模型名称</label>
                <input type="text" id="cfgModel" value="{{ ai_settings.model }}" placeholder="deepseek-chat">
            </div>
            <div class="form-group">
                <label>职位描述（用于 AI Prompt）</label>
                <input type="text" id="cfgRole" value="{{ ai_settings.prompt_template }}" placeholder="例如：前端开发工程师">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><h3>📋 提交模式</h3></div>
        <div class="card-body">
            <label class="toggle-label">
                <input type="checkbox" id="cfgAutoSubmit" {% if auto_submit %}checked{% endif %}>
                <span class="toggle-switch"></span>
                自动提交（关闭则手动确认后提交）
            </label>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><h3>🌐 浏览器设置</h3></div>
        <div class="card-body">
            <div class="form-group">
                <label>操作延迟（秒）</label>
                <input type="number" id="cfgStepDelay" value="{{ browser.step_delay }}" min="0.5" max="5" step="0.5">
            </div>
        </div>
    </div>

    <div class="save-bar">
        <button class="btn btn-primary btn-lg" onclick="saveConfig()">💾 保存配置</button>
    </div>
</div>
{% endblock %}
